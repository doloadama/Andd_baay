databases:
  - name: andd-baay-db
    databaseName: andd_baay
    user: andd_baay
    plan: free

services:
  - type: redis
    name: andd-baay-redis
    plan: free
    ipAllowList: []

  - type: web
    name: andd-baay
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: gunicorn Andd_Baayi.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-file -
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "andd-baay.onrender.com,.onrender.com,localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: worker
    name: andd-baay-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A Andd_Baayi worker -l info --concurrency 2
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: andd-baay
          envVarKey: DJANGO_SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString

  - type: worker
    name: andd-baay-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A Andd_Baayi beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SECRET_KEY
        fromService:
          type: web
          name: andd-baay
          envVarKey: DJANGO_SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
