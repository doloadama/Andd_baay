services:
  - type: web
    name: andd-baay
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      daphne -b 0.0.0.0 -p $PORT Andd_Baayi.asgi:application
    staticPublishPath: staticfiles
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"

databases:
  - name: andd-baay-db
    databaseName: andd_baay
    user: andd_baay
    plan: free

redis:
  - name: andd-baay-redis
    plan: free
    ipAllowList: []
