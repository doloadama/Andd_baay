services:
  - type: web
    name: andd-baay
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      daphne -b 0.0.0.0 -p $PORT Andd_Baayi.asgi:application
    staticPublishPath: staticfiles
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "andd-baay.onrender.com,.onrender.com,localhost,127.0.0.1"

databases:
  - name: andd-baay-db
    databaseName: andd_baay
    user: andd_baay
    plan: free

redis:
  - name: andd-baay-redis
    plan: free
    ipAllowList: []

# Celery Worker - Traitement des tâches en arrière-plan
  - type: worker
    name: andd-baay-worker
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      celery -A Andd_Baayi worker -l info
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString

# Celery Beat - Planificateur de tâches périodiques (Agent IA)
  - type: worker
    name: andd-baay-beat
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      celery -A Andd_Baayi beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: andd-baay-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: andd-baay-redis
          property: connectionString
