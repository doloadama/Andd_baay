# ── nixpacks.toml — Railway build configuration ──────────────────────────────
# Nixpacks v1.41.0 — Python doit être déclaré EXPLICITEMENT dans nixPkgs.
# Sans ça, la phase install génère `python -m venv` mais python n'est pas
# dans PATH ($NIXPACKS_PATH undefined → exit 127).
#
# ℹ️  package.json est dans frontend/ — hors racine — pour éviter que
#     Nixpacks active le provider Node.js (→ npm ci introuvable, exit 127).
#
# Doc : https://nixpacks.com/docs/configuration/file

[phases.setup]
# python3 doit être listé en premier pour qu'il soit bien dans PATH.
# Les autres packages sont requis par WeasyPrint (Cairo, Pango…) et psycopg2 (libpq).
nixPkgs = [
  "python3",
  "cairo",
  "pango",
  "harfbuzz",
  "gdk-pixbuf",
  "libffi",
  "fontconfig",
  "freetype",
  "shared-mime-info",
  "gobject-introspection",
  "postgresql",
]

[phases.install]
# On utilise python3 (pas python) car Nix n'expose que python3 dans PATH.
# La création du venv rend pip disponible ; on active ensuite pour pip install.
cmds = [
  "python3 -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
]

[phases.build]
cmds = [
  ". /opt/venv/bin/activate && python manage.py collectstatic --noinput",
]

# [start] géré par railway.toml (startCommand) pour ne pas dupliquer.
