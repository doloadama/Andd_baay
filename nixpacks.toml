# ── nixpacks.toml — Railway build configuration ──────────────────────────────
# Nixpacks auto-détecte Python et installe requirements.txt seul.
# Ce fichier ajoute uniquement les dépendances système (WeasyPrint, libpq)
# et surcharge la phase build pour collectstatic.
#
# ℹ️  package.json est dans frontend/ — hors racine — pour éviter que
#     Nixpacks active le provider Node.js (→ npm ci introuvable, exit 127).
#
# Doc : https://nixpacks.com/docs/configuration/file

[phases.setup]
# Packages Nix requis par WeasyPrint (Cairo, Pango…) et psycopg2 (libpq).
nixPkgs = [
  "cairo",
  "pango",
  "harfbuzz",
  "gdk-pixbuf",
  "libffi",
  "fontconfig",
  "freetype",
  "shared-mime-info",
  "gobject-introspection",
  "postgresql",
]

# [phases.install] — intentionnellement absent.
# Nixpacks détecte requirements.txt et exécute pip install automatiquement
# avec le bon environnement Python déjà activé.

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput",
]

# [start] géré par railway.toml (startCommand) pour ne pas dupliquer.
