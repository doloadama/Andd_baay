{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card-modern p-5">
                <i class="fas fa-user-times fa-3x text-danger mb-3"></i>
                <h4 class="mb-3">Retirer {{ membre.utilisateur.user.username }} ?</h4>
                <p class="text-muted mb-4">Rôle : {{ membre.get_role_display }}</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i> Retirer</button>
                        <a href="{% url 'detail_ferme' ferme.id %}" class="btn btn-outline-light">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
