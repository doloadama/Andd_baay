{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card-modern p-5">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <h4 class="mb-3">Supprimer {{ ferme.nom }} ?</h4>
                <p class="text-muted mb-4">Cette action supprimera définitivement la ferme et tous ses projets.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-3 justify-content-center">
                        <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i> Confirmer</button>
                        <a href="{% url 'detail_ferme' ferme.id %}" class="btn btn-outline-light">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
