{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-form-card">
                <div class="card-header-modern">
                    <h4><i class="fas fa-plus text-accent me-2"></i>Créer une nouvelle ferme</h4>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form method="post" class="modern-form">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-4">
                            <label class="form-label-modern">{{ field.label }}</label>
                            <div class="input-wrapper">
                                {{ field }}
                            </div>
                            {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <div class="d-flex gap-3 mt-5">
                            <button type="submit" class="btn-submit-modern">
                                <i class="fas fa-save"></i> Créer la ferme
                            </button>
                            <a href="{% url 'liste_fermes' %}" class="btn btn-outline-light px-4">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const paysSelect = document.getElementById('{{ form.pays.id_for_label }}');
    const localiteSelect = document.getElementById('{{ form.localite.id_for_label }}');

    if (paysSelect && localiteSelect) {
        const allLocaliteOptions = Array.from(localiteSelect.options).map(opt => ({
            value: opt.value,
            text: opt.text,
            selected: opt.selected
        }));

        const localitesMapping = JSON.parse('{{ form.localites_mapping_json|escapejs }}');

        function filterLocalites() {
            const selectedPays = paysSelect.value;
            const currentSelectedLocalite = localiteSelect.value;

            localiteSelect.innerHTML = '';

            allLocaliteOptions.forEach(opt => {
                if (!opt.value || localitesMapping[opt.value] === selectedPays) {
                    const option = new Option(opt.text, opt.value);
                    if (opt.value === currentSelectedLocalite && localitesMapping[opt.value] === selectedPays) {
                        option.selected = true;
                    }
                    localiteSelect.add(option);
                }
            });
        }

        paysSelect.addEventListener('change', filterLocalites);
        filterLocalites();
    }
});
</script>
<script src="{% static 'js/gps-button.js' %}"></script>
{% endblock %}
