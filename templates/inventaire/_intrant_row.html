<tr id="intrant-row-{{ intrant.id }}" class="{% if alerte %}is-low{% endif %}">
    <td>
        <strong>{{ intrant.nom }}</strong>
        {% if alerte %}
        <span class="invl-badge-low"><i class="fas fa-triangle-exclamation" aria-hidden="true"></i> Bas</span>
        {% endif %}
    </td>
    <td><span class="invl-cat">{{ intrant.get_categorie_display }}</span></td>
    <td class="text-end"><span class="invl-qty">{{ intrant.quantite }} {{ intrant.get_unite_display }}</span></td>
    <td class="text-center">
        <form method="post" action="{% url 'ajuster_intrant_htmx' intrant.ferme.id intrant.id %}"
              hx-post="{% url 'ajuster_intrant_htmx' intrant.ferme.id intrant.id %}"
              hx-target="#intrant-row-{{ intrant.id }}"
              hx-swap="outerHTML"
              class="invl-adjust">
            {% csrf_token %}
            <button type="submit" name="delta" value="-1" class="invl-adjust__btn invl-adjust__btn--minus" aria-label="Diminuer">−</button>
            <input type="hidden" name="raison" value="Ajustement rapide">
            <button type="submit" name="delta" value="1" class="invl-adjust__btn invl-adjust__btn--plus" aria-label="Augmenter">+</button>
        </form>
    </td>
    <td class="small text-muted">{{ intrant.seuil_alerte }}</td>
    <td class="text-end">
        <a href="{% url 'supprimer_intrant' intrant.ferme.id intrant.id %}" class="invl-row-action" title="Supprimer"
           onclick="return confirm('Supprimer {{ intrant.nom|escapejs }} ?');">
            <i class="fas fa-trash" aria-hidden="true"></i>
        </a>
    </td>
</tr>
