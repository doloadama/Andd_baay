{% load static %}
<!DOCTYPE html>
<html lang="fr" data-bs-theme="light" class="light-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Messagerie Mini{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Base Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <style>
        :root {
            --neon-green: #4ade80;
            --accent: #4ade80;
            --accent-dark: #22c55e;
            --danger: #ef4444;
            --success: #22c55e;
            --info: #3b82f6;
            --warning: #f59e0b;
            --bg-main: #f4f3ef;
            --bg-secondary: #fcfcfb;
            --card-bg: rgba(252, 252, 251, 0.85);
            --card-bg-solid: #fcfcfb;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-glass: rgba(0, 0, 0, 0.08);
            --radius-card: 22px;
            --radius-pill: 40px;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
        }

        .dark-mode {
            --bg-main: #0a0d0a;
            --bg-secondary: #161b13;
            --card-bg: rgba(22, 27, 19, 0.7);
            --card-bg-solid: #161b13;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background: transparent; /* Iframe will have transparent background */
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container-mini {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Glass card styling specifically for mini mode */
        .glass-card {
            background: var(--card-bg-solid);
            border: none;
            border-radius: 0;
            box-shadow: none;
        }

        /* Override link behavior in mini mode to append ?mini=true */
        a:not([target="_blank"]) {
            cursor: pointer;
        }
        
        .btn-modern {
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.8rem;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-primary-modern {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #022c22 !important;
        }
    </style>

    <script>
        // Sync theme with parent window
        window.addEventListener('message', (event) => {
            if (event.data.type === 'THEME_CHANGE') {
                if (event.data.theme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                    document.documentElement.classList.remove('light-mode');
                    document.documentElement.setAttribute('data-bs-theme', 'dark');
                } else {
                    document.documentElement.classList.add('light-mode');
                    document.documentElement.classList.remove('dark-mode');
                    document.documentElement.setAttribute('data-bs-theme', 'light');
                }
            }
        });
        
        // Initial theme fetch from localStorage
        try {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.documentElement.classList.remove('light-mode');
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            }
        } catch(e) {}

        // Ensure all links in the mini frame retain ?mini=true
        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('click', (e) => {
                const link = e.target.closest('a');
                if (link && link.href && !link.href.includes('javascript:') && !link.href.includes('#')) {
                    if (!link.href.includes('mini=true')) {
                        e.preventDefault();
                        const url = new URL(link.href);
                        url.searchParams.set('mini', 'true');
                        window.location.href = url.toString();
                    }
                }
            });
        });
    </script>
    <script defer src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js" crossorigin="anonymous"></script>
    {% include 'includes/alpine_django_messages_register.html' %}
</head>
<body>
    <div class="container-mini">
        {% include 'includes/django_message_toasts.html' %}
        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
