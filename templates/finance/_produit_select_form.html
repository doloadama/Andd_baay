<div>
    <label class="finance-ft-field-label" for="id_projet_produit">
        Culture <span style="font-weight:400;color:var(--fh-text3);text-transform:none;letter-spacing:0;">(optionnel)</span>
    </label>
        {% if projet_produits %}
        <select name="projet_produit" id="id_projet_produit" class="fh-field">
            <option value="" {% if not request.POST.projet_produit %}selected{% endif %}>— Général au projet —</option>
            {% for pp in projet_produits %}
                <option value="{{ pp.pk }}"{% if request.POST.projet_produit == pp.pk|stringformat:"s" %} selected{% endif %}>{{ pp.produit.nom }}</option>
            {% endfor %}
        </select>
        <p class="finance-ft-help">Sans culture : dépense affectée à tout le projet.</p>
    {% else %}
        <select name="projet_produit" id="id_projet_produit" class="fh-field" disabled aria-disabled="true">
            <option value="">Choisissez d'abord un projet</option>
        </select>
        <p class="finance-ft-help">Sélectionnez un projet pour voir ses cultures.</p>
    {% endif %}
</div>
