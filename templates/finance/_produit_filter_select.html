<div class="tw-mb-0">
    <label class="finance-ft-field-label finance-scope-label" for="id_produit_scope">
        <span class="finance-scope-label__inner">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="finance-ft-leaf"><path d="M12 22c4-6 8-9 8-14a8 8 0 10-16 0c0 5 4 8 8 14z" stroke="currentColor" stroke-width="1.5"/><path d="M12 22V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span class="finance-scope-label__text">Périmètre culture</span>
        </span>
    </label>
    <select name="produit_scope" id="id_produit_scope" class="fh-field">
        <option value="all"{% if produit_scope == "all" %} selected{% endif %}>Toutes les cultures</option>
        <option value="general"{% if produit_scope == "general" %} selected{% endif %}>Général au projet</option>
        {% for pp in projet_produits %}
            <option value="{{ pp.pk }}"{% if produit_scope == pp.pk|stringformat:"s" %} selected{% endif %}>{{ pp.produit.nom }}</option>
        {% endfor %}
    </select>
</div>
