<script defer>
document.addEventListener('alpine:init', function () {
    Alpine.data('djangoToastStack', function () {
        return {
            items: [],
            nextKey: 1,
            pushToast: function (text, tag) {
                var t = tag || '';
                var kind = 'info';
                if (t.indexOf('error') !== -1 || t.indexOf('danger') !== -1) kind = 'danger';
                else if (t.indexOf('warning') !== -1) kind = 'warning';
                else if (t.indexOf('success') !== -1) kind = 'success';
                var critical = t.indexOf('budget-critical') !== -1;
                var id = this.nextKey++;
                this.items.push({ id: id, kind: kind, text: text, critical: critical });
                var delay = 5500;
                if (t.indexOf('budget-critical') !== -1) {
                    delay = 45000;
                } else if (kind === 'danger') {
                    delay = 9000;
                }
                var self = this;
                setTimeout(function () {
                    self.items = self.items.filter(function (x) {
                        return x.id !== id;
                    });
                }, delay);
            },
            boot: function () {
                var src = document.getElementById('django-messages-source');
                if (!src) return;
                var nodes = src.querySelectorAll('[data-msg-tag]');
                for (var i = 0; i < nodes.length; i++) {
                    var el = nodes[i];
                    this.pushToast(el.textContent.trim(), el.getAttribute('data-msg-tag') || 'info');
                }
                src.remove();
            },
        };
    });
});
</script>
