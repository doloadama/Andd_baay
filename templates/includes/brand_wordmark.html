{% comment %}
  Wordmark Andd Baay : pictogramme (feuille + circuits) + titre + baseline.
  Charte : Nuit #04342C, Primaire #1D9E75, Pâle #9FE1CB, Fond #E1F5EE — Plus Jakarta Sans 700 / 400.
  Paramètre : variant = nav | footer | auth
{% endcomment %}
<svg class="brand-wordmark-svg{% if variant == 'footer' %} brand-wordmark-svg--footer{% elif variant == 'auth' %} brand-wordmark-svg--auth{% else %} brand-wordmark-svg--nav{% endif %}"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 226 46"
     fill="none"
     aria-hidden="true"
     focusable="false">
    <title>Logo Andd Baay</title>
    <g class="brand-wordmark-mark" transform="translate(0,3) scale(0.5)">
        <!-- Tuile favicon-style -->
        <rect class="brand-wordmark-mark-bg" width="64" height="64" rx="14"/>
        <!-- Silhouette feuille (Pâle) -->
        <path class="brand-wordmark-leaf"
              fill="#9FE1CB"
              d="M32 9C23 11 15 18 14 27c-1 9 4 17 18 21 14-4 19-12 18-21C49 18 41 11 32 9z"/>
        <!-- Circuits orthogonaux — Nuit + Primaire -->
        <path fill="none"
              stroke="#04342C"
              stroke-width="1.85"
              stroke-linecap="square"
              stroke-linejoin="miter"
              d="M32 41V27m0 0h-11v10m11-10h13V17"/>
        <path fill="none"
              stroke="#1D9E75"
              stroke-width="1.65"
              stroke-linecap="square"
              stroke-linejoin="miter"
              d="M26 21h13v9h-9"/>
        <!-- Pastilles / nœuds -->
        <circle cx="32" cy="41" r="2.5" fill="#04342C"/>
        <circle cx="32" cy="27" r="2.5" fill="#04342C"/>
        <circle cx="21" cy="37" r="2.5" fill="#04342C"/>
        <circle cx="45" cy="17" r="2.5" fill="#04342C"/>
        <circle cx="26" cy="21" r="2.35" fill="#04342C"/>
        <circle cx="39" cy="30" r="2.35" fill="#04342C"/>
    </g>
    <text class="brand-wordmark-text{% if variant == 'auth' %} brand-wordmark-text--on-dark{% endif %}"
          x="40"
          y="23">Andd Baay</text>
    <text class="brand-wordmark-tagline{% if variant == 'auth' %} brand-wordmark-tagline--on-dark{% endif %}"
          x="40"
          y="37">Intelligence agricole</text>
</svg>
