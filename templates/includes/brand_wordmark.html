{% comment %}
  Wordmark Andd Baay : pictogramme + texte (SVG inline pour hériter de --font-display).
  Paramètre : variant = nav | footer | auth
{% endcomment %}
<svg class="brand-wordmark-svg{% if variant == 'footer' %} brand-wordmark-svg--footer{% elif variant == 'auth' %} brand-wordmark-svg--auth{% else %} brand-wordmark-svg--nav{% endif %}"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 184 40"
     fill="none"
     aria-hidden="true"
     focusable="false">
    <g class="brand-wordmark-mark" transform="translate(0,4) scale(0.5)">
        <rect width="64" height="64" rx="14" fill="#22c55e"/>
        <path fill="#14532d" d="M32 10c-8 19-16 23-16 34a16 16 0 1 0 32 0c0-11-8-15-16-34z"/>
        <path fill="#f0fdf4" fill-opacity=".92" d="M32 21c-4 10-8 15-8 21a8 8 0 1 0 16 0c0-6-4-11-8-21z"/>
        <path stroke="#bbf7d0" stroke-width="1.2" stroke-linecap="round" d="M32 24v14M26 30h12" opacity=".55"/>
    </g>
    <text class="brand-wordmark-text{% if variant == 'auth' %} brand-wordmark-text--on-dark{% endif %}" x="38" y="26.5">Andd Baay</text>
</svg>
