{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne — Andd Baay</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #a3e635;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .offline-card {
            max-width: 420px;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
        p { color: var(--muted); line-height: 1.55; margin-bottom: 28px; }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: #0f172a;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            transition: transform .15s ease, opacity .15s ease;
        }
        .btn:hover { transform: translateY(-2px); opacity: .9; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Les pages que vous avez déjà consultées restent disponibles. Essayez de rafraîchir lorsque la connexion revient.</p>
        <a href="/" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
