{% extends "base.html" %}
{% block title %}Nouveau Mot de Passe | Andd Baay{% endblock %}

{% block content %}
<div class="center-wrap animate__animated animate__fadeInUp">
    <div class="surface-card">
        <div class="surface-icon info">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="surface-title">Choisir un nouveau mot de passe</h1>
        <p class="surface-subtitle">Entrez et confirmez votre nouveau mot de passe.</p>

        <form method="post" class="mt-3">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <div class="actions-row">
                <button type="submit" class="btn-modern btn-primary-modern" style="min-width: 240px;">
                    Mettre a jour <i class="fas fa-check"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
