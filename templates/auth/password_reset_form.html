{% extends "base.html" %}
{% block title %}Reinitialiser Mot de Passe | Andd Baay{% endblock %}

{% block content %}
<div class="center-wrap animate__animated animate__fadeInUp">
    <div class="surface-card">
        <div class="surface-icon info">
            <i class="fas fa-key"></i>
        </div>
        <h1 class="surface-title">Reinitialiser le mot de passe</h1>
        <p class="surface-subtitle">Entrez votre email. Nous vous enverrons un lien de reinitialisation.</p>

        <form method="post" class="mt-3">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <div class="actions-row">
                <button type="submit" class="btn-modern btn-primary-modern" style="min-width: 220px;">
                    Envoyer le lien <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
