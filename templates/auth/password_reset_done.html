{% extends "base.html" %}
{% block title %}Email Envoye | Andd Baay{% endblock %}

{% block content %}
<div class="center-wrap animate__animated animate__fadeInUp">
    <div class="surface-card text-center">
        <div class="surface-icon info">
            <i class="fas fa-envelope-open-text"></i>
        </div>
        <h1 class="surface-title">Email envoye</h1>
        <p class="surface-subtitle">Si un compte existe avec cet email, vous recevrez un lien pour reinitialiser votre mot de passe.</p>
        <div class="actions-row">
            <a href="{% url 'login' %}" class="btn-modern btn-outline-modern" style="min-width: 220px;">
                <i class="fas fa-arrow-left"></i> Retour connexion
            </a>
        </div>
    </div>
</div>
{% endblock %}
