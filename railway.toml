# ── railway.toml — Configuration Railway (partagée par tous les services) ─────
# Ce fichier est lu par TOUS les services créés depuis ce dépôt (web, worker,
# beat). startCommand, healthcheckPath et healthcheckTimeout sont donc absents :
# chaque service doit définir sa propre commande de démarrage dans le dashboard
# (Settings → Deploy → Custom Start Command).
#
# Commandes à configurer dans le dashboard :
#   web    → python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT Andd_Baayi.asgi:application
#   worker → celery -A Andd_Baayi worker --loglevel=info --concurrency=2 -Q celery,default
#   beat   → celery -A Andd_Baayi beat --scheduler django_celery_beat.schedulers:DatabaseScheduler --loglevel=info
#
# Doc : https://docs.railway.com/reference/config-as-code

[build]
builder = "RAILPACK"
# Railpack détecte Python automatiquement via requirements.txt.
# Les packages système (WeasyPrint, psycopg2) sont dans railpack.json.
buildCommand = "python manage.py collectstatic --noinput"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
