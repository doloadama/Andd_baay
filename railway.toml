# ── railway.toml — Configuration Railway du service WEB ──────────────────────
# Les services Worker et Beat partagent le même build mais ont leur propre
# startCommand défini dans le dashboard (Settings → Deploy → Custom Start Command).
# Doc : https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
# buildCommand intentionnellement absent : nixpacks.toml gère les phases
# (setup → install auto → build/collectstatic). Un buildCommand ici
# court-circuiterait les phases Nixpacks et perdrait les nixPkgs.

[deploy]
startCommand = "python manage.py migrate --noinput && daphne -b 0.0.0.0 -p $PORT Andd_Baayi.asgi:application"
healthcheckPath = "/health/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
